site_name: a site
site_author: xyyzz1
site_url: 'https://xyyzz1.github.io/notebook'

repo_name: 'xyyzz1/notebook'
repo_url: 'https://github.com/xyyzz1/notebook'
edit_uri: blob/main/docs

theme:
  name: material
  language: zh
  favicon: _assets/favicon.ico
  icon:
    logo: octicons/paper-airplane-16
    repo: fontawesome/brands/github-alt
    admonition:
      info: fontawesome/solid/anchor
      note: fontawesome/solid/pen-nib
      abstract: fontawesome/solid/list
      tip: fontawesome/solid/lightbulb
      success: fontawesome/solid/check
      question: fontawesome/solid/circle-question
      warning: fontawesome/solid/triangle-exclamation
      failure: material/alien
      danger: fontawesome/solid/virus
      bug: fontawesome/solid/robot
      example: fontawesome/solid/flask
      quote: fontawesome/solid/link
  font:
    text: LXGW WenKai Screen GB Screen
    code: JetBrains Mono
  palette:
    scheme: default
    primary: brown
    accent: deep orange
  features:
    - content.code.annotate
    - content.code.copy
    - navigation.tracking
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.share
  custom_dir: overrides

plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\-\.]+'
  - git-revision-date-localized:
      type: datetime
      timezone: Asia/Shanghai
      locale: zh
      enable_creation_date: true
      fallback_to_build_date: true
      exclude:
        - index.md
        - about.md

markdown_extensions:
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify {kwds: {case: lower}}
  - admonition
  - abbr
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

copyright: 'Copyright &copy 2026 xyyzz1'

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/xyyzz1
      name: Github

extra_css:
  - _css/extra.css
  - _css/inline-comments.css
  - https://gcore.jsdelivr.net/npm/lxgw-wenkai-screen-webfont@1.1.0/style.css
  - https://gcore.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css

extra_javascript:
  - _js/extra.js
  - _js/quote-comment.js
  - _js/stats.js
  - _js/likes.js
  - _js/inline-comments.js
  - _js/news.js
  - _js/summary.js
  - https://fastly.jsdelivr.net/gh/stevenjoezhang/live2d-widget@latest/autoload.js

nav:
  - "💠 封面":
    - "💠 封面": index.md
    - "👤 关于我": about.md
  - "📝 学习笔记":
    - notes/index.md
    - "Markdown 自学笔记": notes/markdown.md
    - "HTML 自学笔记": notes/html.md
    - "CSS 自学笔记": notes/css.md
